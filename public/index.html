<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge, chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" as="style" onload="this.rel='stylesheet'">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js" as="script">
    <link rel="stylesheet" href="css/main.css">
  </head>
  <body>
    <!-- WRAPPER -->
    <div id="wrapper">
      <!-- HEADER -->
      <header id="header">
        <div class="container-fluid">
          <div class="row">
            <div class="col">
              <h1>Chatbot</h1>
            </div>
          </div>
        </div>
      </header>
      <!-- CONTENT -->
      <main id="content">
        <div class="container-fluid">
          <div id="messages"></div>
        </div>
      </main>
      <!-- FOOTER -->
      <footer id="footer">
        <div class="container-fluid">
          <form novalidate>
            <fieldset>
              <legend class="visually-hidden">Add message</legend>
              <div class="d-flex">
                <input id="message" class="form-control" name="message" type="text" placeholder="Enter a user message here." aria-label="Message">
                <button class="btn btn-primary" type="submit">Submit</button>
              </div>
            </fieldset>
          </form>
        </div>
      </footer>
    </div>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="js/client.js"></script>
  </body>
</html>
